<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traveller Campaign Tracker</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Settings Modal Layer -->
        <div id="settingsModal" class="modal hidden">
            <div class="modal-content glass-panel">
                <h2>System Configuration</h2>
                <div class="form-group">
                    <label for="filepathInput">Campaign Filepath (Local Path to Markdown)</label>
                    <input type="text" id="filepathInput" placeholder="/home/user/campaign.md">
                </div>
                <div class="form-group row">
                    <div style="flex: 1;">
                        <label for="weeksBeforeInput">Weeks Before</label>
                        <input type="number" id="weeksBeforeInput" value="2" min="0" max="10">
                    </div>
                    <div style="flex: 1;">
                        <label for="weeksAfterInput">Weeks After</label>
                        <input type="number" id="weeksAfterInput" value="2" min="0" max="10">
                    </div>
                </div>
                <div class="modal-actions">
                    <button id="saveSettingsBtn" class="btn primary">Apply Settings</button>
                    <button id="closeSettingsBtn" class="btn secondary">Close</button>
                </div>
            </div>
        </div>

        <!-- Consecutive Review Modal -->
        <div id="reviewModal" class="modal hidden">
            <div class="modal-content glass-panel review-panel">
                <h2>Consecutive Events Review</h2>
                <div class="form-group row">
                    <input type="text" id="reviewStartInput" placeholder="YYYY-DDD">
                    <span> to </span>
                    <input type="text" id="reviewEndInput" placeholder="YYYY-DDD">
                    <button id="loadReviewBtn" class="btn primary">Load Review</button>
                </div>
                <div id="reviewContent" class="review-content"></div>
                <div class="modal-actions mt-auto">
                    <button id="closeReviewBtn" class="btn secondary">Close View</button>
                </div>
            </div>
        </div>

        <header class="glass-panel main-header">
            <div class="header-title">
                <h1>TRAVELLER</h1>
                <div class="subtitle">CAMPAIGN TRACKER</div>
            </div>
            
            <div class="current-date-controls">
                <input type="text" id="currentDateDisplay" class="date-input" value="1105-001">
                <div class="date-controls">
                    <button id="btnIncDay" class="btn small" title="+1 Day">+1 D</button>
                    <button id="btnGasGiant" class="btn small" title="Gas Giant Refuel (+1 Day)">⛽</button>
                    <button id="btnJump" class="btn small accent" title="Jump (+7 Days)">JMP</button>
                </div>
            </div>

            <div class="header-actions">
                <button id="btnSaveToDisk" class="btn success hidden">Commit File</button>
                <button id="btnReview" class="btn secondary">Log Review</button>
                <button id="btnSettings" class="btn secondary">⚙ Config</button>
            </div>
        </header>

        <main class="main-content">
            <div class="calendar-panel glass-panel">
                <div class="calendar-header">
                    <h2>Timeline View</h2>
                </div>
                <div id="calendarGrid" class="calendar-grid">
                    <!-- Calendar weeks injected here via JS -->
                </div>
            </div>

            <div class="note-panel glass-panel">
                <div class="note-header">
                    <h2>Log Entry: <span id="noteDateLabel">----</span></h2>
                </div>
                <div class="editor-container">
                    <textarea id="noteEditor" placeholder="Enter markdown formatted notes for this date..."></textarea>
                    <div id="notePreview" class="markdown-body"></div>
                </div>
                <div class="note-actions" style="justify-content: space-between;">
                    <button id="btnSetCurrent" class="btn accent" title="Mark this date as the main Current Date">Mark Active as Current</button>
                    <button id="btnTogglePreview" class="btn secondary">View Markdown</button>
                </div>
            </div>
        </main>
    </div>
    
    <script src="marked.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
